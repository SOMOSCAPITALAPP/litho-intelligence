<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Litho Intelligence hors ligne</title>
    <style>
      :root {
        color: #382f2b;
        background: #f7f1ea;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 520px;
        text-align: center;
      }

      img {
        width: 88px;
        height: 88px;
        border-radius: 999px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 9vw, 3.25rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #6d625d;
        font-size: 1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/pwa-icon-192.png" alt="Litho Intelligence" />
      <h1>Mode hors ligne</h1>
      <p>
        Litho Intelligence est installée sur votre appareil. Reconnectez-vous pour accéder aux fiches pierres,
        formations, guides et recommandations mises à jour.
      </p>
    </main>
  </body>
</html>
